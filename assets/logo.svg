<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Ma Compta Simplifie">
  <title>Ma Compta Simplifie</title>
  <defs>
    <clipPath id="clipC">
      <!-- A thick C shape (stroke) used as clipping mask -->
      <path d="M88 30
               A42 42 0 1 0 88 98"
            transform="rotate(-90 64 64)"
            fill="none"
            stroke="#000"
            stroke-width="10"
            stroke-linecap="round"/>
    </clipPath>
  </defs>

  <!-- Background (match sidebar/nav color) -->
  <rect width="128" height="128" rx="28" fill="#0f172a"/>

  <!-- C outline (opening to the top after rotation) -->
  <path d="M88 30
           A42 42 0 1 0 88 98"
        transform="rotate(-90 64 64)"
        fill="none"
        stroke="#ffffff"
        stroke-width="10"
        stroke-linecap="round"/>

  <!-- Bars remain vertical and grow from bottom -->
  <g clip-path="url(#clipC)" fill="#7c3aed">
    <rect x="44" y="66" width="12" height="26" rx="2"/>
    <rect x="58" y="54" width="12" height="38" rx="2"/>
    <rect x="72" y="42" width="12" height="50" rx="2"/>
  </g>
</svg>

